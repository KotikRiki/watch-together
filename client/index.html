<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e293b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Смотрите видео вместе с друзьями в реальном времени" />
    <title>Watch Together</title>
  </head>
  <body>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
        caches.keys().then(function(ks) {
          ks.forEach(function(k) { caches.delete(k); });
        });
      }
    </script>
    <div id="loading" style="background:#0a0a0f;color:#fff;font-family:system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;box-sizing:border-box;position:fixed;inset:0;z-index:9999">
      <div style="text-align:center;max-width:360px">
        <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#3b82f6;border-radius:50%;margin:0 auto 24px;animation:spin 0.8s linear infinite"></div>
        <div style="font-size:15px;color:rgba(255,255,255,0.9);margin-bottom:12px;font-weight:500">Загрузка...</div>
        <div id="joke" style="font-size:13px;color:rgba(255,255,255,0.4);line-height:1.5;min-height:40px;white-space:pre-line;margin-bottom:20px"></div>
        <button id="ready-btn" onclick="document.getElementById('loading').style.display='none'" style="display:none;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);padding:10px 28px;border-radius:12px;font-size:13px;cursor:pointer;transition:all 0.2s" onmouseover="this.style.background='rgba(255,255,255,0.15)';this.style.color='rgba(255,255,255,0.9)'" onmouseout="this.style.background='rgba(255,255,255,0.1)';this.style.color='rgba(255,255,255,0.7)'">Прочитал</button>
      </div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script>
      var jokes=[
        "Полицейский останавливает машину:\n— Знаете, почему я вас остановил?\n— Надеюсь, не потому что мы одни в машине.",
        "Жена мужу:\n— Дорогой, я купила лотерейный билет.\n— Напрасно. Шансов выиграть меньше, чем меня в субботу дома найти.",
        "Врач:\n— У вас все органы на месте.\n— А мозги?\n— Технически — тоже орган.",
        "Два друга в баре:\n— Ты веришь в любовь с первого взгляда?\n— Я вообще в людей с первого взгляда не верю.",
        "Учитель:\n— Иванов, назови три типа памяти.\n— Хорошая, плохая и как у бабушки.",
        "Мужчина в ресторане:\n— Официант, в супе муха!\n— Не переживайте, сэр. Она не будет есть больше, чем вы.",
        "Клиент в магазине:\n— У вас есть галоши?\n— Нет.\n— А ботинки?\n— Нет.\n— А что у вас есть?\n— Мухи. Большие, зелёные.\n— Ну давайте хотя бы мух.\n— Ловите! Ахахах!",
        "Рыжий парень заходит в бар.\n— Пива.\n— Рыжим нельзя.\n— А колу?\n— Рыжим нельзя.\n— Ну воду?\n— Рыжим нельзя.\n— А почему??\n— Потому что пиздуй отсюда, ты бар обливаешь.",
        "Кот сидит на дереве. Подходит собака:\n— Эй, слезай!\n— Не-а.\n— Слезай, а то я вызову полицию!\n— Вызывай. Буду сидеть и смотреть, как ты с ними разговариваешь.",
        "Таксист подвозит пассажира:\n— Вы не первый раз в Москве?\n— Нет.\n— А часто бываете?",
        "Сидит крокодил в пустыне. Рядом жираф.\n— Жарко, да?\n— Да.\n— А ты зонтик берёшь?\n— Беру.\n— А я вот не беру...",
        "Кто-то однажды сказал: \"Будь собой, потому что все остальные заняты.\" А я свободен. Вот и сижу один.",
        "Маленькая девочка:\n— Мама, а почему у кота хвост?\n— А чтобы было за что держаться, когда он летает.\n— А он летает?\n— Ну... однажды был такой случай.",
        "Мужчина заходит в библиотеку:\n— Можно мне книгу про паранойю?\n— Она у меня в кармане.",
        "На экзамене профессор:\n— Что такое?\nСтудент:\n— Что — что такое?\nПрофессор:\n— Ну вот, видите, он уже философ.",
        "Жена:\n— Дорогой, если бы я умерла, ты бы женился снова?\n— Нет.\n— А если бы?\n— Нет.\n— А почему?\n— Потому что ты меня любишь.",
        "Кто-то: \"У тебя есть дробилка для чеснока?\"\nЯ: \"Нет. У меня есть зубы и ярость.\"",
        "Интернет-магазин: \"Ваш заказ доставлен!\"\nЯ: \"Я не заказывал ничего.\"\nИнтернет-магазин: \"Тем не менее.\""
      ];
      document.getElementById('joke').textContent=jokes[Math.floor(Math.random()*jokes.length)];
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
