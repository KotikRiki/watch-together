services:
  - type: web
    name: watch-together
    runtime: node
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install && npm run build
    startCommand: cd server && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: watch-together-db
          property: connectionString
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASS
        sync: false

databases:
  - name: watch-together-db
    plan: free
    databaseName: watch_together
